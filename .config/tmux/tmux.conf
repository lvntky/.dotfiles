# ╔══════════════════════════════════════════════════════╗
# ║                   tmux.conf                          ║
# ║         Emacs-style keybindings · modus-vivendi      ║
# ╚══════════════════════════════════════════════════════╝

# ── Prefix ──────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix          # C-a C-a → send literal C-a to shell

# ── General ─────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g base-index 1           # windows start at 1
setw -g pane-base-index 1     # panes start at 1
set -g renumber-windows on    # fill gaps when a window closes
set -sg escape-time 0         # no delay after Escape (important for Emacs!)
set -g display-time 1500
set -g focus-events on

# ── Emacs Key Bindings ───────────────────────────────────
set -g mode-keys emacs
set -g status-keys emacs

# ── True Color ───────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",alacritty:RGB"

# ── Reload config ────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "✓ Config reloaded"

# ── Window Management ────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window

# switch windows with Alt+number (no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ── Pane Splitting ───────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane Navigation (Emacs-style: M-arrows, no prefix) ──
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# also works with prefix + arrow
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D

# ── Pane Resizing (prefix + Shift+arrows) ────────────────
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5

# ── Copy Mode (Emacs) ────────────────────────────────────
# Enter:  C-a [
# Select: C-Space
# Copy:   M-w
# Paste:  C-a ]
bind ] paste-buffer -p

# ── Activity Monitoring ──────────────────────────────────
setw -g monitor-activity on
set -g visual-activity off

# ─────────────────────────────────────────────────────────
# MODUS-VIVENDI COLOR PALETTE
# bg-main    #000000   fg-main     #ffffff
# bg-dim     #1e1e1e   fg-dim      #989898
# bg-active  #535353   fg-active   #ffffff
# blue       #79a8ff   cyan        #00d3d0
# green      #44bc44   yellow      #d0bc00
# magenta    #feacd0   red         #ff8059
# orange     #ff8700   (colour208)
# ─────────────────────────────────────────────────────────

# ── Pane Background ──────────────────────────────────────
set -g window-style        "bg=#000000,fg=#606060"  # pasif pane: karartılmış
set -g window-active-style "bg=#000000,fg=#ffffff"  # aktif pane: tam beyaz

# ── Pane Borders ─────────────────────────────────────────
set -g pane-border-lines        heavy                # kalın çizgi
set -g pane-border-style        "fg=#535353"         # pasif border: koyu gri
set -g pane-active-border-style "fg=#ff8700"         # aktif border: turuncu (colour208)

# ─────────────────────────────────────────────────────────
# STATUS BAR
# ─────────────────────────────────────────────────────────

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Status bar genel
set -g status-style "bg=#1e1e1e,fg=#989898"

# Pencere listesi
set -g window-status-style          "bg=#1e1e1e,fg=#989898"
set -g window-status-current-style  "bg=#535353,fg=#ffffff,bold"
set -g window-status-activity-style "fg=#ff8059"

# Mesaj ve copy mode
set -g message-style "bg=#535353,fg=#ffffff"
set -g mode-style    "bg=#535353,fg=#ffffff"

# Left: session name
set -g status-left-length 30
set -g status-left " #[fg=#ff8700,bold]󰎹 #S#[fg=#535353] │ "

# Right: host · time
set -g status-right-length 60
set -g status-right "#[fg=#989898]#H#[fg=#535353] · #[fg=#44bc44]%H:%M #[fg=#989898]%d %b "

# Window list format
set -g window-status-format         " #I:#W "
set -g window-status-current-format " #I:#W "

# ─────────────────────────────────────────────────────────
# PLUGINS (TPM)
# ─────────────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Initialize TPM (keep at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
